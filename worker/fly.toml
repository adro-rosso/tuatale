# fly.toml app configuration file generated for tuatale-worker on 2026-06-07T20:31:42+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tuatale-worker'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
