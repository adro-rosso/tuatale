<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>VERTICAL-SPLIT prototype — portrait image left, text right</title>

<!-- Standalone prototype, NOT a canonical template. Tests the LAYOUT
     MECHANICS of a portrait-image side-by-side template (distinct from
     prompt-2's landscape-side-by-side via aspect-pin to 3:4 portrait).
     Using an existing landscape image — image will look awkward
     (heavy side-crop into 3:4 column), but the layout-mechanics test
     is what matters here. -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
  @page {
    size: 11in 8.5in;
    margin: 0;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 11in;
    height: 8.5in;
    overflow: hidden;
    /* Unified cream 2026-05-24 — was #F0E8D8; now #FAF9F0 (rim-match)
       to eliminate the rectangular luminance step around Gemini's
       painted-rim borders. This is the fix the rim-diagnosis prototype
       validated. See SESSION_NOTES "BG unification (2026-05-24)". */
    background-color: #FAF9F0;
  }
  .page {
    position: relative;
    width: 11in;
    height: 8.5in;
  }

  /* ---- IMAGE COLUMN (left 0% - 58%) --------------------------------
     Full-height, 58% page width. 3:4 portrait pin: 8.5in × 0.75 = 6.375in
     → 57.95% page width → 58% rounded. When Gemini's image is pinned to
     3:4 (productionised version), the image fills this column with ZERO
     object-fit:cover crop. In this mockup we feed a LANDSCAPE image,
     which will get aggressively side-cropped — known caveat, judging
     layout mechanics not image content. */
  .image-column {
    position: absolute;
    top: 0;
    left: 0;
    width: 58%;
    height: 100%;
  }
  .image-column img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    display: block;
  }

  /* ---- TEXT COLUMN (right 58% - 100%, 42% wide, full-height) -------
     Pure cream by construction (image column is clipped at 58%). No
     backdrop, no halo — same bands-as-CSS structural guarantee as
     prompt-7 v2 / workhorse-drama. Flex-centered vertically; 4%
     horizontal padding within the column so text doesn't crowd the
     hard cut OR the page right edge. */
  .text-column {
    position: absolute;
    top: 0;
    left: 58%;
    width: 42%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    padding-left: 4%;
    padding-right: 4%;
  }
  .narrative {
    font-family: "EB Garamond", Garamond, "Times New Roman", serif;
    font-size: 20pt;
    font-weight: 400;
    line-height: 1.5;
    letter-spacing: 0.005em;
    font-variant-numeric: oldstyle-nums;
    color: #1F1A14;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="page">
    <div class="image-column">
      <img src="{{IMAGE_URL}}" alt="">
    </div>
    <div class="text-column">
      <div class="narrative">{{NARRATIVE_TEXT}}</div>
    </div>
  </div>
</body>
</html>
