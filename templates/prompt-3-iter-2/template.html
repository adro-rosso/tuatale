<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>template — prompt-3-iter-2</title>

<!-- Google Fonts: EB Garamond (Stage A, 2026-06-17). Brand warm humanist
     oldstyle serif, unifying this template with the cover + other page
     templates. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<style>
  /* ---- Page size + reset ---------------------------------------------
     Landscape letter. Solid cream page background — this is what guarantees
     the text strip is clean cream regardless of the illustration. */
  @page {
    size: 11in 8.5in;
    margin: 0;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 11in;
    height: 8.5in;
    overflow: hidden;
    background-color: #FAF9F0;
  }

  /* ---- Page container ----------------------------------------------- */
  .page {
    position: relative;
    width: 11in;
    height: 8.5in;
  }

  /* ---- Image band (top 64%) -----------------------------------------
     REBUILT 2026-06-17. The illustration is a wide band across the TOP of
     the page, NOT full-bleed. The bottom 36% of the page is left as the
     solid cream body background — a CSS-GUARANTEED cream strip the text
     sits on, so legibility never depends on the illustration leaving a
     painted clearing (the failure of the old full-page version). The
     band's lower edge feathers into the cream so the painting melts into
     paper rather than ending on a hard line. object-position:center top
     anchors the subject (upper two-thirds of the source) and crops the
     calm bottom of the source under the feather. */
  .image-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 64%;
  }
  .image-layer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    -webkit-mask-image: linear-gradient(to bottom, black 0%, black 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 0%, black 80%, transparent 100%);
  }

  /* ---- Text layer (Type C — fixed config-declared box) --------------
     page-pipeline injects top/left/width/height from config.textRegion +
     the auto-fit font-size. Static values mirror config.textRegion
     {x:0.11, y:0.70, w:0.78, h:0.25} — a box that sits entirely in the
     bottom cream strip (below the 64% image band). Flex-centers the
     narrative within the box. No backdrop / halo needed: the strip is
     solid cream by construction. */
  .text-layer {
    position: absolute;
    top: 70%;
    left: 11%;
    width: 78%;
    height: 25%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .narrative {
    font-family: "EB Garamond", Garamond, "Times New Roman", serif;
    /* Fallback size; Type C auto-fit injects the actual size (config maxFontSize). */
    font-size: 20pt;
    font-weight: 400;
    line-height: 1.5;
    /* Warm ink-brown — warmer than prompt-2's #1F1A14, per the spec. */
    color: #3D2418;
    /* Refined serif tracking + EB Garamond's old-style figures. */
    letter-spacing: 0.005em;
    font-variant-numeric: oldstyle-nums;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="page">
    <div class="image-layer">
      <img src="{{IMAGE_URL}}" alt="">
    </div>
    <div class="text-layer">
      <div class="narrative">{{NARRATIVE_TEXT}}</div>
    </div>
  </div>
</body>
</html>
