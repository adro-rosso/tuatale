<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>template — prompt-7-iter-1 (short-text FILL band)</title>

<!-- EB Garamond — the same warm humanist serif as prompt-3 / the cover, so
     a Simplest book set in this template matches the rest of the catalogue. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<style>
  /* ---- Page size + reset ---------------------------------------------
     Landscape letter. Solid cream page background — this guarantees the
     text strip is clean cream regardless of the illustration (the proven
     prompt-3-iter-2 architecture; the SCRAPPED v1 vignette relied on Gemini
     painting the cream, which was unreliable). */
  @page { size: 11in 8.5in; margin: 0; }
  html, body {
    margin: 0;
    padding: 0;
    width: 11in;
    height: 8.5in;
    overflow: hidden;
    background-color: #FAF9F0;
  }

  .page { position: relative; width: 11in; height: 8.5in; }

  /* ---- Image band (top 70%) -----------------------------------------
     A LARGE illustration band — bigger than prompt-3's 64% — so a page with
     only a short line or two of text still reads FULL: the image dominates
     and the compact text band below is filled by big type. The lower edge
     feathers into the cream so the painting melts into paper rather than
     ending on a hard line. object-position:center top anchors the subject
     (upper two-thirds of the source) and crops the calm bottom under the
     feather. */
  .image-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 70%;
  }
  .image-layer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    -webkit-mask-image: linear-gradient(to bottom, black 0%, black 82%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 0%, black 82%, transparent 100%);
  }

  /* ---- Text layer (Type C — fixed config-declared box) --------------
     page-pipeline injects top/left/width/height from config.textRegion +
     the auto-fit font-size via a !important dynamicCss block. The static
     values below are fallbacks mirroring config.textRegion
     {x:0.10, y:0.735, w:0.80, h:0.19} — a compact box in the bottom cream
     strip (below the 70% image band). Flex-centers the short narrative so a
     big single line or two sit centred in the band. The strip is solid cream
     by construction, so no backdrop / halo is needed. */
  .text-layer {
    position: absolute;
    top: 73.5%;
    left: 10%;
    width: 80%;
    height: 19%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .narrative {
    font-family: "EB Garamond", Garamond, "Times New Roman", serif;
    /* Fallback size; Type C auto-fit injects the actual size (up to config
       maxFontSize 32pt) so a short narrative fills the band at a big, warm
       size instead of reading sparse. */
    font-size: 30pt;
    font-weight: 400;
    line-height: 1.45;
    color: #3D2418;
    letter-spacing: 0.005em;
    font-variant-numeric: oldstyle-nums;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="page">
    <div class="image-layer">
      <img src="{{IMAGE_URL}}" alt="">
    </div>
    <div class="text-layer">
      <div class="narrative">{{NARRATIVE_TEXT}}</div>
    </div>
  </div>
</body>
</html>
